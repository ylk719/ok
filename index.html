<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好好柯的桌面</title>
    <!-- 引入外部样式表 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-screen">
        <!-- 状态栏 -->
        <div class="status-bar">
            <span>NuxOS</span>
            <span>16:01</span>
            <span>📶 🔋</span>
        </div>

        <!-- 个人信息卡片 -->
        <div class="profile-card">
            <div class="avatar">
                <img src="https://picsum.photos/id/40/100/100" alt="头像">
            </div>
            <div class="nickname">好好柯</div>
            <div class="id">HHK_id</div>
            <div class="bio">淡淡的就会顺顺的</div>
            <div class="location">📍 台北, 台灣</div>
        </div>

        <!-- 中间组件区 -->
        <div class="widget-area">
            <div class="love-widget">
                <div class="days">7<span>天</span></div>
                <div class="couple-avatars">
                    <img src="https://picsum.photos/id/64/60/60" alt="女生头像">
                    <img src="https://picsum.photos/id/91/60/60" alt="男生头像">
                </div>
                <div class="love-text">🐰 恋爱纪念 🐻</div>
                <div class="date">2026.05.02</div>
            </div>

            <div class="app-grid">
                <div class="app-icon">
                    <div class="icon">💬</div>
                    <span>消息</span>
                </div>
                <div class="app-icon">
                    <div class="icon">👤</div>
                    <span>名册</span>
                </div>
                <div class="app-icon">
                    <div class="icon">🌍</div>
                    <span>此时此刻</span>
                </div>
                <div class="app-icon">
                    <div class="icon">🐰</div>
                    <span>世界书</span>
                </div>
            </div>
        </div>

        <!-- 底部Dock栏 -->
        <div class="dock-bar">
            <div class="dock-icon">
                <div class="icon">🐱</div>
                <span>外观</span>
            </div>
            <div class="dock-icon">
                <div class="icon">💕</div>
                <span>情侣空间</span>
            </div>
            <div class="dock-icon">
                <div class="icon">P❤P</div>
                <span>论坛</span>
            </div>
            <div class="dock-icon">
                <div class="icon">⚙️</div>
                <span>设置</span>
            </div>
        </div>
    </div>

    <!-- 引入交互脚本 -->
    <script src="desktop-interactive.js"></script>
</body>
</html>
